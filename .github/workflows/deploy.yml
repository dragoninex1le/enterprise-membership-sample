name: Deploy Admin UI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  SAM_STACK_NAME: enterprise-membership-sample
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Validate required secrets
        run: |
          MISSING=()
          [ -z "${{ secrets.ACM_CERTIFICATE_ARN }}" ]       && MISSING+=("ACM_CERTIFICATE_ARN")
          [ -z "${{ secrets.PORTH_API_URL }}" ]             && MISSING+=("PORTH_API_URL")
          [ -z "${{ secrets.PLATFORM_AUTH0_DOMAIN }}" ]     && MISSING+=("PLATFORM_AUTH0_DOMAIN")
          [ -z "${{ secrets.PLATFORM_AUTH0_CLIENT_ID }}" ]  && MISSING+=("PLATFORM_AUTH0_CLIENT_ID")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "✅ All required secrets present"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.PORTH_API_URL }}
          VITE_AUTH0_DOMAIN: ${{ secrets.VITE_AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ secrets.VITE_AUTH0_CLIENT_ID }}
          VITE_AUTH0_AUDIENCE: ${{ secrets.VITE_AUTH0_AUDIENCE }}

      - name: SAM deploy (infrastructure)
        run: |
          sam deploy \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              Environment=prod \
              PorthApiUrl=${{ secrets.PORTH_API_URL }} \
              AcmCertificateArn=${{ secrets.ACM_CERTIFICATE_ARN }} \
            --no-fail-on-empty-changeset

      - name: Resolve stack outputs
        id: outputs
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='AdminUIBucketName'].OutputValue" \
            --output text)
          CF_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "cf_id=$CF_ID" >> $GITHUB_OUTPUT

      - name: Get Components stack outputs
        id: components
        run: |
          USERS_TABLE=$(aws cloudformation describe-stacks \
            --stack-name porth-components \
            --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='UsersTableName'].OutputValue | [0]" \
            --output text)
          echo "Users Table: $USERS_TABLE"
          echo "users_table=$USERS_TABLE" >> "$GITHUB_OUTPUT"

      - name: Bootstrap platform tenant
        env:
          PLATFORM_AUTH0_DOMAIN: ${{ secrets.PLATFORM_AUTH0_DOMAIN }}
          PLATFORM_AUTH0_CLIENT_ID: ${{ secrets.PLATFORM_AUTH0_CLIENT_ID }}
          USERS_TABLE: ${{ steps.components.outputs.users_table }}
        run: |
          python3 - <<'PYEOF'
          import boto3
          import os
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc).isoformat()
          table_name = os.environ['USERS_TABLE']
          auth0_domain = os.environ['PLATFORM_AUTH0_DOMAIN']
          auth0_client_id = os.environ['PLATFORM_AUTH0_CLIENT_ID']

          dynamodb = boto3.resource('dynamodb', region_name='us-east-1')
          table = dynamodb.Table(table_name)

          table.update_item(
              Key={'PK': 'TENANT#platform', 'SK': 'METADATA'},
              UpdateExpression=(
                  'SET #slug = :slug, #name = :name, organization_id = :org_id, '
                  'environment_type = :env_type, #status = :status, '
                  'idp_config_override = :idp, updated_at = :updated_at, '
                  'id = if_not_exists(id, :id), '
                  'created_at = if_not_exists(created_at, :created_at)'
              ),
              ExpressionAttributeNames={
                  '#slug': 'slug',
                  '#name': 'name',
                  '#status': 'status',
              },
              ExpressionAttributeValues={
                  ':slug': 'platform',
                  ':name': 'Platform Administration',
                  ':org_id': 'platform',
                  ':env_type': 'production',
                  ':status': 'active',
                  ':idp': {
                      'domain': auth0_domain,
                      'client_id': auth0_client_id,
                  },
                  ':id': 'platform',
                  ':created_at': now,
                  ':updated_at': now,
              },
          )
          print(f"✅ Platform tenant bootstrapped in {table_name}")
          PYEOF

      - name: Sync assets to S3
        run: |
          # Long-cache all hashed assets, no-cache index.html
          aws s3 sync frontend/dist s3://${{ steps.outputs.outputs.bucket }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 cp frontend/dist/index.html \
            s3://${{ steps.outputs.outputs.bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.cf_id }} \
            --paths "/*"
