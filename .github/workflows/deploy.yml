name: Deploy Admin UI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  SAM_STACK_NAME: enterprise-membership-sample
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Validate required secrets
        run: |
          MISSING=()
          [ -z "${{ secrets.ACM_CERTIFICATE_ARN }}" ]       && MISSING+=("ACM_CERTIFICATE_ARN")
          [ -z "${{ secrets.PLATFORM_AUTH0_DOMAIN }}" ]     && MISSING+=("PLATFORM_AUTH0_DOMAIN")
          [ -z "${{ secrets.PLATFORM_AUTH0_CLIENT_ID }}" ]  && MISSING+=("PLATFORM_AUTH0_CLIENT_ID")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "\u274c Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "\u2705 All required secrets present"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Porth API URL from CloudFormation
        run: |
          PORTH_API_URL=$(aws cloudformation describe-stacks \
            --stack-name porth-components \
            --query "Stacks[0].Outputs[?OutputKey=='PorthApiUrl'].OutputValue" \
            --output text)
          echo "PORTH_API_URL=$PORTH_API_URL" >> $GITHUB_ENV

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ env.PORTH_API_URL }}
          VITE_AUTH0_DOMAIN: ${{ secrets.VITE_AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ secrets.VITE_AUTH0_CLIENT_ID }}
          VITE_AUTH0_AUDIENCE: ${{ secrets.VITE_AUTH0_AUDIENCE }}

      - name: SAM deploy (infrastructure)
        run: |
          sam deploy \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              Environment=prod \
              PorthApiUrl=${{ env.PORTH_API_URL }} \
              AcmCertificateArn=${{ secrets.ACM_CERTIFICATE_ARN }} \
            --no-fail-on-empty-changeset

      - name: Resolve stack outputs
        id: outputs
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='AdminUIBucketName'].OutputValue" \
            --output text)
          CF_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "cf_id=$CF_ID" >> $GITHUB_OUTPUT

      - name: Install porth-common
        run: |
          pip install "git+https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/dragoninex1le/Components.git"

      - name: Bootstrap platform tenant
        env:
          PORTH_ENVIRONMENT: prod
        run: python3 scripts/bootstrap_platform_tenant.py

      - name: Sync assets to S3
        run: |
          # Long-cache all hashed assets, no-cache index.html
          aws s3 sync frontend/dist s3://${{ steps.outputs.outputs.bucket }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 cp frontend/dist/index.html \
            s3://${{ steps.outputs.outputs.bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.cf_id }} \
            --paths "/*"
